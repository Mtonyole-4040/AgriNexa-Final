<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriNEXA Onboarding</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="farm-bg">

<div class="overlay"></div>

<div class="page-container">

<div class="question-box">

<h2>Hello Farmer 👋 I am AgriNEXA AI</h2>

<p class="subtitle">
Let me understand your farm and generate smart agricultural intelligence.
</p>

<div class="question-grid">

<div class="question-card">
<label>🌍 Which region is your farm located?</label>
<select>
<option>Arusha</option>
<option>Dodoma</option>
<option>Mbeya</option>
<option>Morogoro</option>
</select>
</div>

<div class="question-card">
<label>🌱 What crop are you farming?</label>
<select>
<option>Coffee</option>
<option>Maize</option>
<option>Rice</option>
<option>Beans</option>
</select>
</div>

<div class="question-card">
<label>📏 Farm Size (Acres)</label>
<input type="number" placeholder="Example: 4">
</div>

<div class="question-card">
<label>💰 Estimated Farming Budget</label>
<input type="number" placeholder="Example: 1000000">
</div>

<div class="question-card">
<label>🌦 Current Weather Condition</label>
<select>
<option>Sunny</option>
<option>Rainy</option>
<option>Dry</option>
<option>Storm Risk</option>
</select>
</div>

<div class="question-card">
<label>🛡 Do you have farm insurance?</label>
<select>
<option>Yes</option>
<option>No</option>
<option>Planning to get one</option>
</select>
</div>

<div class="question-card">
<label>🧠 How are you emotionally feeling this season?</label>
<select>
<option>Confident</option>
<option>Worried</option>
<option>Stressed</option>
<option>Hopeful</option>
</select>
</div>

</div>

<button class="generate-btn" onclick="goToLoading()">
Generate AgriNEXA AI Insights
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
